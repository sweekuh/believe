name: Deploy to GitHub Pages

on:
  # Publish whenever the live content on main changes
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Let the workflow enable Pages and publish using the built-in GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deploy at a time; never cancel an in-flight publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Stage the static site (index + content only)
        run: |
          mkdir -p _site
          cp index.html episodes.json _site/
          # Serve the files exactly as-is; skip Jekyll processing
          touch _site/.nojekyll

      - name: Configure GitHub Pages (enables it on the first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
